<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,30,0.9), rgba(0,0,30,0.95)),
                        url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0,255,255,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: cyan;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: #1e1e2f;
            color: white;
            outline: none;
        }

        input:focus {
            border: 1px solid cyan;
            box-shadow: 0 0 8px cyan;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, cyan, blue);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, blue, cyan);
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: cyan;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 10px;
            color: #ff4b2b;
            font-size: 14px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Login</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="{% url 'signup' %}">Signup</a>
    </div>

    {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}

    <div class="footer">
        AI Multi Project System
    </div>

</div>

</body>
</html>
