<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(10,10,25,0.9), rgba(10,10,25,0.95)),
                        url('https://images.unsplash.com/photo-1555949963-aa79dcee981c');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #00e6e6;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #1c1c2e;
            color: #fff;
            font-size: 14px;
        }

        input:focus {
            border: 1px solid #00e6e6;
            box-shadow: 0 0 5px #00e6e6;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00e6e6, #007bff);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #007bff, #00e6e6);
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #00e6e6;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(255, 0, 0, 0.2);
            color: #ff8080;
            font-size: 13px;
        }

        .success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ffcc;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">🚀 Signup</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

    {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}

    <div class="footer">
        AI-Based Prediction System
    </div>

</div>

</body>
</html>
